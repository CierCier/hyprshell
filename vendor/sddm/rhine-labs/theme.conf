[General]
scale = 1.0
enable-animations = true

[LockScreen]
display = true
padding-top = 0
use-background-color = true
background-color = #000000

[LoginScreen]
background = main.png
use-background-color = true
background-color = #f5f1ea
blur = 0
brightness = 0.0
saturation = 0.0

[LoginScreen.LoginArea]
position = right
margin = 100

[LoginScreen.LoginArea.Avatar]
shape = circle
border-radius = 14
active-size = 120
inactive-size = 80
inactive-opacity = 0.45
active-border-size = 2
inactive-border-size = 0
active-border-color = #d8c5ab
inactive-border-color = #ddd5cb

[LoginScreen.LoginArea.Username]
font-family = ITC Avant Garde Gothic Std
font-size = 18
font-weight = 700
color = #171411
margin = 14

[LoginScreen.LoginArea.PasswordInput]
width = 250
height = 46
display-icon = true
font-family = ITC Avant Garde Gothic Std
font-size = 14
icon = password.svg
icon-size = 16
content-color = #1f1b16
background-color = #ffffff
background-opacity = 0.0
border-size = 0
border-color = #d9d1c6
border-radius-left = 10
border-radius-right = 10
margin-top = 12

[LoginScreen.LoginArea.LoginButton]
background-color = #ffffff
background-opacity = 0.0
active-background-color = #eee6dc
active-background-opacity = 1.0
icon = arrow-right.svg
icon-size = 20
content-color = #1f1b16
active-content-color = #1f1b16
border-size = 0
border-color = #d9d1c6
border-radius-left = 10
border-radius-right = 10
margin-left = 8
show-text-if-no-password = true
hide-if-not-needed = true
font-family = ITC Avant Garde Gothic Std
font-size = 12
font-weight = 700

[LoginScreen.LoginArea.Spinner]
display-text = true
text = "AUTHENTICATING"
font-family = ITC Avant Garde Gothic Std
font-weight = 700
font-size = 14
icon-size = 30
icon = spinner.svg
color = #6b6257
spacing = 10

[LoginScreen.LoginArea.WarningMessage]
font-family = ITC Avant Garde Gothic Std
font-size = 11
font-weight = 700
normal-color = #6b6257
warning-color = #8b6b3f
error-color = #b42318
margin-top = 10

[LoginScreen.MenuArea.Buttons]
margin-top = 0
margin-right = 0
margin-bottom = 0
margin-left = 0
size = 34
border-radius = 10
spacing = 12
font-family = ITC Avant Garde Gothic Std

[LoginScreen.MenuArea.Popups]
max-height = 300
item-height = 30
item-spacing = 2
padding = 8
display-scrollbar = false
margin = 5
background-color = #fffdf9
background-opacity = 0.98
active-option-background-color = #eee6dc
active-option-background-opacity = 1.0
content-color = #1f1b16
active-content-color = #1f1b16
font-family = ITC Avant Garde Gothic Std
border-size = 0
border-color = #ddd5cb
font-size = 11
icon-size = 16

[LoginScreen.MenuArea.Session]
display = true
position = bottom-right
index = 0
popup-direction = up
popup-align = center
display-session-name = true
button-width = 220
popup-width = 200
background-color = #ffffff
background-opacity = 0.0
active-background-opacity = 1.0
content-color = #1f1b16
active-content-color = #1f1b16
border-size = 0
font-size = 12
icon-size = 16

[LoginScreen.MenuArea.Layout]
display = true
position = bottom-right
index = 1
popup-direction = up
popup-align = center
popup-width = 180
display-layout-name = true
background-color = #ffffff
background-opacity = 0.0
active-background-opacity = 1.0
content-color = #1f1b16
active-content-color = #1f1b16
border-size = 0
font-size = 12
icon = language.svg
icon-size = 16

[LoginScreen.MenuArea.Keyboard]
display = true
position = bottom-right
index = 2
background-color = #ffffff
background-opacity = 0.0
active-background-opacity = 1.0
content-color = #1f1b16
active-content-color = #1f1b16
border-size = 0
icon = keyboard.svg
icon-size = 16

[LoginScreen.MenuArea.Power]
display = true
position = bottom-right
index = 3
popup-direction = up
popup-align = center
popup-width = 100
background-color = #ffffff
background-opacity = 0.0
active-background-opacity = 1.0
content-color = #1f1b16
active-content-color = #1f1b16
border-size = 0
icon = power.svg
icon-size = 16

[LoginScreen.VirtualKeyboard]
scale = 1.0
position = login
start-hidden = true
background-color = #fffdf9
background-opacity = 0.98
key-content-color = #1f1b16
key-color = #f2ece4
key-opacity = 1.0
key-active-background-color = #e5d7c4
key-active-opacity = 1.0
selection-background-color = #d8c5ab
selection-content-color = #1f1b16
primary-color = #c7b49a
border-size = 0
border-color = #ddd5cb

[Tooltips]
enable = true
font-family = ITC Avant Garde Gothic Std
font-size = 11
content-color = #1f1b16
background-color = #fffdf9
background-opacity = 0.96
border-radius = 8
disable-user = false
disable-login-button = false
